name: WeatherEdge Reinvestment

on:
  schedule:
    # Run hourly so each station-local entry window gets multiple attempts when
    # model publication or GitHub scheduling is delayed. Runtime freshness and
    # entry-window gates remain authoritative.
    - cron: "15 * * * *"
  workflow_dispatch:
    inputs:
      execute:
        description: "Execute live trades when WEATHEREDGE_LIVE is 1"
        required: false
        default: "false"

concurrency:
  group: weatheredge-reinvest
  cancel-in-progress: false

jobs:
  reinvest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      TZ: America/Vancouver
      WEATHEREDGE_LIVE: ${{ vars.WEATHEREDGE_LIVE || '0' }}
      WEATHEREDGE_BANKROLL: ${{ vars.WEATHEREDGE_BANKROLL }}
      WEATHEREDGE_STRATEGY: ${{ vars.WEATHEREDGE_STRATEGY }}
      WEATHEREDGE_MARKET_ANCHOR_COEFFICIENT: ${{ vars.WEATHEREDGE_MARKET_ANCHOR_COEFFICIENT }}
      WEATHEREDGE_MARKET_ANCHOR_MIN_OPPOSITE_PROBABILITY: ${{ vars.WEATHEREDGE_MARKET_ANCHOR_MIN_OPPOSITE_PROBABILITY }}
      WEATHEREDGE_HYBRID_NORMAL_MIN_MARKET_PROBABILITY: ${{ vars.WEATHEREDGE_HYBRID_NORMAL_MIN_MARKET_PROBABILITY }}
      WEATHEREDGE_HYBRID_NORMAL_BUY_BUDGET_FRACTION: ${{ vars.WEATHEREDGE_HYBRID_NORMAL_BUY_BUDGET_FRACTION }}
      WEATHEREDGE_MAX_PER_TRADE: ${{ vars.WEATHEREDGE_MAX_PER_TRADE }}
      WEATHEREDGE_MAX_BUYS: ${{ vars.WEATHEREDGE_MAX_BUYS || '8' }}
      WEATHEREDGE_MAX_GROUP_FRACTION: ${{ vars.WEATHEREDGE_MAX_GROUP_FRACTION || '0.25' }}
      WEATHEREDGE_MAX_BUY_SPEND_FRACTION: ${{ vars.WEATHEREDGE_MAX_BUY_SPEND_FRACTION }}
      WEATHEREDGE_MAX_BUY_SPEND_USD: ${{ vars.WEATHEREDGE_MAX_BUY_SPEND_USD }}
      WEATHEREDGE_KELLY_MULTIPLIER: ${{ vars.WEATHEREDGE_KELLY_MULTIPLIER || '0.25' }}
      WEATHEREDGE_MAX_KELLY_FRACTION: ${{ vars.WEATHEREDGE_MAX_KELLY_FRACTION || '0.25' }}
      WEATHEREDGE_MIN_EDGE: ${{ vars.WEATHEREDGE_MIN_EDGE }}
      WEATHEREDGE_MIN_CONFIDENCE: ${{ vars.WEATHEREDGE_MIN_CONFIDENCE || 'medium' }}
      WEATHEREDGE_MIN_CASH_TO_REINVEST: ${{ vars.WEATHEREDGE_MIN_CASH_TO_REINVEST || '1' }}
      WEATHEREDGE_TARGET_CASH_RESERVE: ${{ vars.WEATHEREDGE_TARGET_CASH_RESERVE || '20' }}
      WEATHEREDGE_PAUSE_BUYS: ${{ vars.WEATHEREDGE_PAUSE_BUYS || 'true' }}
      WEATHEREDGE_HIGH_ENTRY_START_LOCAL_TIME: ${{ vars.WEATHEREDGE_HIGH_ENTRY_START_LOCAL_TIME || '20:00' }}
      WEATHEREDGE_HIGH_ENTRY_END_LOCAL_TIME: ${{ vars.WEATHEREDGE_HIGH_ENTRY_END_LOCAL_TIME || '23:30' }}
      WEATHEREDGE_LOW_ENTRY_START_LOCAL_TIME: ${{ vars.WEATHEREDGE_LOW_ENTRY_START_LOCAL_TIME || '11:00' }}
      WEATHEREDGE_LOW_ENTRY_END_LOCAL_TIME: ${{ vars.WEATHEREDGE_LOW_ENTRY_END_LOCAL_TIME || '14:30' }}
      WEATHEREDGE_INVERSE_LOW_ENTRY_START_LOCAL_TIME: ${{ vars.WEATHEREDGE_INVERSE_LOW_ENTRY_START_LOCAL_TIME }}
      WEATHEREDGE_INVERSE_LOW_ENTRY_END_LOCAL_TIME: ${{ vars.WEATHEREDGE_INVERSE_LOW_ENTRY_END_LOCAL_TIME }}
      WEATHEREDGE_MAX_MODEL_RUN_AGE_HOURS: ${{ vars.WEATHEREDGE_MAX_MODEL_RUN_AGE_HOURS || '12' }}
      WEATHEREDGE_VISTADEX_QUOTE_TIMEOUT_MS: ${{ vars.WEATHEREDGE_VISTADEX_QUOTE_TIMEOUT_MS || '90000' }}
      WEATHEREDGE_VISTADEX_FILLER_TIMEOUT_MS: ${{ vars.WEATHEREDGE_VISTADEX_FILLER_TIMEOUT_MS || '120000' }}
      WEATHEREDGE_VISTADEX_MAX_ATTEMPTS: ${{ vars.WEATHEREDGE_VISTADEX_MAX_ATTEMPTS || '2' }}
      WEATHEREDGE_VISTADEX_RETRY_BACKOFF_MS: ${{ vars.WEATHEREDGE_VISTADEX_RETRY_BACKOFF_MS || '10000' }}
      WEATHEREDGE_REQUIRE_RECENT_AUDIT_POSITIVE: ${{ vars.WEATHEREDGE_REQUIRE_RECENT_AUDIT_POSITIVE || 'true' }}
      WEATHEREDGE_AUDIT_LOOKBACK_HOURS: ${{ vars.WEATHEREDGE_AUDIT_LOOKBACK_HOURS || '72' }}
      WEATHEREDGE_AUDIT_MIN_POSITIONS: ${{ vars.WEATHEREDGE_AUDIT_MIN_POSITIONS || '5' }}
      WEATHEREDGE_CALIBRATION_HALF_LIFE_DAYS: ${{ vars.WEATHEREDGE_CALIBRATION_HALF_LIFE_DAYS }}
      WEATHEREDGE_CITY_BIAS_PRIOR_WEIGHT: ${{ vars.WEATHEREDGE_CITY_BIAS_PRIOR_WEIGHT }}
      WEATHEREDGE_DATA_RELEASE_TAG: ${{ vars.WEATHEREDGE_DATA_RELEASE_TAG || 'weatheredge-calibration-data' }}
      WEATHEREDGE_DATA_ASSET: ${{ vars.WEATHEREDGE_DATA_ASSET || 'weatheredge-data.tar.gz' }}
      WEATHEREDGE_SHOULD_EXECUTE: ${{ github.event_name == 'schedule' || inputs.execute == 'true' }}
      PREDICTION_TRADER_LIVE: ${{ vars.WEATHEREDGE_LIVE || '0' }}
      PREDICTION_TRADER_MAX_USD: ${{ vars.PREDICTION_TRADER_MAX_USD }}
      PREDICTION_TRADER_LEDGER_PATH: data/trades/ledger.jsonl
      WEATHER_CACHE_DIR: .cache/weatheredge
      VISTADEX_CLIENT_API_KEY: ${{ secrets.VISTADEX_CLIENT_API_KEY }}
      VISTADEX_SECRET_KEY: ${{ secrets.VISTADEX_SECRET_KEY }}
      VISTADEX_RPC_URL: ${{ vars.VISTADEX_RPC_URL || 'https://api.mainnet-beta.solana.com' }}
      VISTADEX_POSITIONS_API_URL: ${{ vars.VISTADEX_POSITIONS_API_URL || 'https://markets.vistadex.com' }}
      VISTADEX_APP_URL: ${{ vars.VISTADEX_APP_URL || 'https://www.app.vistadex.com' }}
      NOAA_CDO_TOKEN: ${{ secrets.NOAA_CDO_TOKEN }}
      NWS_USER_AGENT: ${{ vars.NWS_USER_AGENT || 'prediction-trader/0.1 weatheredge github-actions' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Restore WeatherEdge cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/weatheredge
            data/weather
            data/trades/ledger.jsonl
          key: weatheredge-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            weatheredge-${{ runner.os }}-

      - name: Restore WeatherEdge calibration datasets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REQUIRED_DATASETS="
          data/weather/markets/polymarket-weather-snapshots.jsonl
          data/weather/forecasts/openmeteo-previous-runs.jsonl
          data/weather/observations/noaa-ghcnd-daily.jsonl
          data/weather/resolution/weather-resolution-actuals.jsonl
          "

          missing=0
          for path in ${REQUIRED_DATASETS}; do
            if [ ! -s "${path}" ]; then
              missing=1
            fi
          done

          if [ "${missing}" = "0" ]; then
            echo "WeatherEdge calibration datasets restored from cache."
            exit 0
          fi

          echo "WeatherEdge calibration datasets missing from cache; downloading ${WEATHEREDGE_DATA_ASSET} from release ${WEATHEREDGE_DATA_RELEASE_TAG}."
          mkdir -p /tmp/weatheredge-data
          gh release download "${WEATHEREDGE_DATA_RELEASE_TAG}" \
            --pattern "${WEATHEREDGE_DATA_ASSET}" \
            --dir /tmp/weatheredge-data \
            --clobber
          tar -xzf "/tmp/weatheredge-data/${WEATHEREDGE_DATA_ASSET}"

          for path in ${REQUIRED_DATASETS}; do
            if [ ! -s "${path}" ]; then
              echo "Required calibration dataset is still missing after restore: ${path}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Run WeatherEdge reinvestment loop
        run: |
          mkdir -p data/trades

          if [ -z "${WEATHEREDGE_MIN_EDGE}" ]; then
            echo "WEATHEREDGE_MIN_EDGE repo variable is required; refusing to run live trading with an implicit edge threshold."
            exit 1
          fi
          if [ -z "${WEATHEREDGE_STRATEGY}" ]; then
            echo "WEATHEREDGE_STRATEGY repo variable is required; refusing to run live trading with an implicit model."
            exit 1
          fi
          if [ -z "${WEATHEREDGE_MAX_BUY_SPEND_FRACTION}" ]; then
            echo "WEATHEREDGE_MAX_BUY_SPEND_FRACTION repo variable is required; refusing to run without an explicit account-wide buy budget."
            exit 1
          fi
          if [ -z "${PREDICTION_TRADER_MAX_USD}" ]; then
            echo "PREDICTION_TRADER_MAX_USD repo variable is required as an execution safety ceiling."
            exit 1
          fi

          ARGS="--days-ahead 1 --strategy ${WEATHEREDGE_STRATEGY} --max-buys ${WEATHEREDGE_MAX_BUYS} --max-group-fraction ${WEATHEREDGE_MAX_GROUP_FRACTION} --max-buy-spend-fraction ${WEATHEREDGE_MAX_BUY_SPEND_FRACTION} --kelly-multiplier ${WEATHEREDGE_KELLY_MULTIPLIER} --max-kelly-fraction ${WEATHEREDGE_MAX_KELLY_FRACTION} --min-edge ${WEATHEREDGE_MIN_EDGE} --min-confidence ${WEATHEREDGE_MIN_CONFIDENCE} --min-cash-to-reinvest ${WEATHEREDGE_MIN_CASH_TO_REINVEST} --target-cash-reserve ${WEATHEREDGE_TARGET_CASH_RESERVE} --high-entry-start-local-time ${WEATHEREDGE_HIGH_ENTRY_START_LOCAL_TIME} --high-entry-end-local-time ${WEATHEREDGE_HIGH_ENTRY_END_LOCAL_TIME} --low-entry-start-local-time ${WEATHEREDGE_LOW_ENTRY_START_LOCAL_TIME} --low-entry-end-local-time ${WEATHEREDGE_LOW_ENTRY_END_LOCAL_TIME} --max-model-run-age-hours ${WEATHEREDGE_MAX_MODEL_RUN_AGE_HOURS} --vistadex-quote-timeout-ms ${WEATHEREDGE_VISTADEX_QUOTE_TIMEOUT_MS} --vistadex-filler-timeout-ms ${WEATHEREDGE_VISTADEX_FILLER_TIMEOUT_MS} --vistadex-max-attempts ${WEATHEREDGE_VISTADEX_MAX_ATTEMPTS} --vistadex-retry-backoff-ms ${WEATHEREDGE_VISTADEX_RETRY_BACKOFF_MS} --report-path data/trades/weatheredge-report.json"

          if [ "${WEATHEREDGE_STRATEGY}" = "market-informed-inverse" ] || [ "${WEATHEREDGE_STRATEGY}" = "market_informed_inverse" ] || [ "${WEATHEREDGE_STRATEGY}" = "market-informed-hybrid" ] || [ "${WEATHEREDGE_STRATEGY}" = "market_informed_hybrid" ]; then
            if [ -z "${WEATHEREDGE_MARKET_ANCHOR_COEFFICIENT}" ] || [ -z "${WEATHEREDGE_MARKET_ANCHOR_MIN_OPPOSITE_PROBABILITY}" ] || [ -z "${WEATHEREDGE_INVERSE_LOW_ENTRY_START_LOCAL_TIME}" ] || [ -z "${WEATHEREDGE_INVERSE_LOW_ENTRY_END_LOCAL_TIME}" ]; then
              echo "Market-informed strategies require explicit market-anchor and inverse-low entry-window variables."
              exit 1
            fi
            ARGS="${ARGS} --market-anchor-coefficient ${WEATHEREDGE_MARKET_ANCHOR_COEFFICIENT} --market-anchor-min-opposite-probability ${WEATHEREDGE_MARKET_ANCHOR_MIN_OPPOSITE_PROBABILITY} --inverse-low-entry-start-local-time ${WEATHEREDGE_INVERSE_LOW_ENTRY_START_LOCAL_TIME} --inverse-low-entry-end-local-time ${WEATHEREDGE_INVERSE_LOW_ENTRY_END_LOCAL_TIME}"
          fi

          if [ "${WEATHEREDGE_STRATEGY}" = "market-informed-hybrid" ] || [ "${WEATHEREDGE_STRATEGY}" = "market_informed_hybrid" ]; then
            if [ -z "${WEATHEREDGE_HYBRID_NORMAL_MIN_MARKET_PROBABILITY}" ] || [ -z "${WEATHEREDGE_HYBRID_NORMAL_BUY_BUDGET_FRACTION}" ]; then
              echo "The market-informed hybrid strategy requires explicit normal-lane probability and buy-budget variables."
              exit 1
            fi
            ARGS="${ARGS} --hybrid-normal-min-market-probability ${WEATHEREDGE_HYBRID_NORMAL_MIN_MARKET_PROBABILITY} --hybrid-normal-buy-budget-fraction ${WEATHEREDGE_HYBRID_NORMAL_BUY_BUDGET_FRACTION}"
          fi

          if [ -n "${WEATHEREDGE_MAX_PER_TRADE}" ]; then
            ARGS="${ARGS} --max-per-trade ${WEATHEREDGE_MAX_PER_TRADE}"
          fi

          if [ -n "${WEATHEREDGE_MAX_BUY_SPEND_USD}" ]; then
            ARGS="${ARGS} --max-buy-spend-usd ${WEATHEREDGE_MAX_BUY_SPEND_USD}"
          fi

          if [ -n "${WEATHEREDGE_BANKROLL}" ]; then
            ARGS="${ARGS} --bankroll ${WEATHEREDGE_BANKROLL}"
          fi

          if [ -n "${WEATHEREDGE_CALIBRATION_HALF_LIFE_DAYS}" ]; then
            ARGS="${ARGS} --calibration-half-life-days ${WEATHEREDGE_CALIBRATION_HALF_LIFE_DAYS}"
          fi

          if [ -n "${WEATHEREDGE_CITY_BIAS_PRIOR_WEIGHT}" ]; then
            ARGS="${ARGS} --city-bias-prior-weight ${WEATHEREDGE_CITY_BIAS_PRIOR_WEIGHT}"
          fi

          if [ "${WEATHEREDGE_REQUIRE_RECENT_AUDIT_POSITIVE}" = "true" ]; then
            ARGS="${ARGS} --require-recent-audit-positive --audit-lookback-hours ${WEATHEREDGE_AUDIT_LOOKBACK_HOURS} --audit-min-positions ${WEATHEREDGE_AUDIT_MIN_POSITIONS}"
          fi

          if [ "${WEATHEREDGE_PAUSE_BUYS}" = "true" ]; then
            ARGS="${ARGS} --pause-buys"
          fi

          if [ "${WEATHEREDGE_LIVE}" = "1" ] && [ "${WEATHEREDGE_SHOULD_EXECUTE}" = "true" ]; then
            ARGS="${ARGS} --execute"
          fi

          npm run weather:reinvest -- ${ARGS}

      - name: Upload WeatherEdge artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weatheredge-${{ github.run_id }}
          path: |
            data/trades/*.jsonl
            data/trades/weatheredge-report.json
          if-no-files-found: warn
